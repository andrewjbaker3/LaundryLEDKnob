<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Comparison Gallery</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card-bg: #242424;
            --text: #e0e0e0;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 800px;
        }
        .header h1 { font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
        .header p { color: #888; line-height: 1.5; margin-bottom: 24px; }

        /* --- GLOBAL TAB CONTROLS --- */
        .global-tabs {
            display: inline-flex;
            background: #111;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .tab {
            padding: 8px 24px;
            cursor: pointer;
            border-radius: 9px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* --- INTERNAL PHASE TABS --- */
        .phase-tabs {
            display: inline-flex;
            background: #111;
            padding: 3px;
            border-radius: 10px;
            margin-bottom: 16px;
            border: 1px solid #333;
        }
        .phase-tab {
            padding: 6px 16px;
            cursor: pointer;
            border-radius: 7px;
            font-weight: 600;
            font-size: 11px;
            transition: all 0.2s ease;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .phase-tab.active {
            background: #444;
            color: #fff;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            max-width: 900px;
        }

        .comparison-row {
            display: grid;
            grid-template-columns: 320px 1fr;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            gap: 40px;
            align-items: start;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* --- KNOB STYLING --- */
        .knob-view {
            position: relative;
            width: 280px;
            height: 280px;
            justify-self: center;
        }
        svg {
            width: 100%;
            height: 100%;
            transform: rotate(-78.75deg); /* Align LED #1 to 12 o'clock */
        }
        .led-bg { stroke: #2a2a2a; stroke-linecap: round; stroke-width: 6; fill: none; }
        .led {
            stroke: #fff;
            stroke-linecap: round;
            stroke-width: 6;
            fill: none;
            opacity: 0.02; 
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.8));
            transition: opacity 0.016s linear;
        }
        .metallic-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(from 180deg, #777 0%, #eee 15%, #777 30%, #444 50%, #777 70%, #eee 85%, #777 100%);
            box-shadow: 
                0 0 0 1px #111,
                inset 0 0 0 2px #d8d8d8,
                inset 0 0 12px 6px rgba(0,0,0,0.4),
                0 8px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .metallic-knob::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, transparent 50%, rgba(255,255,255,0.2) 100%);
        }

        /* --- TEXT STYLING --- */
        .info h2 { margin: 0 0 8px 0; font-size: 20px; color: #fff; }
        .info p { margin: 0 0 20px 0; font-size: 14px; color: #aaa; line-height: 1.6; }
        
        /* --- TIMELINE SPEC UI --- */
        .timeline-container {
            width: 100%;
            background: #1c1c1c;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #333;
            font-family: "SFMono-Regular", Consolas, monospace;
        }
        .timeline-header {
            color: #888;
            font-size: 11px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }
        .timeline-track {
            display: flex;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 12px;
            background: #111;
        }
        .timeline-step {
            height: 100%;
            border-right: 1px solid #1c1c1c;
        }
        .timeline-legend {
            display: flex;
            flex-direction: column; gap: 8px;
        }
        .legend-item {
            display: flex; justify-content: space-between; font-size: 11px; color: #ccc;
        }
        .legend-left { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 8px; height: 8px; border-radius: 2px; }
        .legend-curve { color: #666; font-size: 10px; }

        /* --- DETAILED HANDOFF SPEC STYLES --- */
        .spec-details {
            margin-top: 16px;
            background: #151515;
            border-radius: 8px;
            border: 1px solid #333;
            overflow: hidden;
        }
        .spec-summary {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            user-select: none;
            transition: color 0.2s, background 0.2s;
            list-style: none; /* Hide default triangle */
        }
        .spec-summary::-webkit-details-marker { display: none; }
        .spec-summary::before {
            content: '▶';
            display: inline-block;
            margin-right: 8px;
            font-size: 10px;
            transition: transform 0.2s ease-in-out;
        }
        details.spec-details[open] .spec-summary::before {
            transform: rotate(90deg);
        }
        .spec-summary:hover { color: #fff; background: #1a1a1a; }
        .spec-content {
            padding: 16px;
            border-top: 1px solid #333;
        }
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            font-family: "SFMono-Regular", Consolas, monospace;
        }
        .spec-table th {
            text-align: left;
            padding: 4px 8px;
            font-size: 10px;
            color: #888;
            border-bottom: 1px solid #444;
            text-transform: uppercase;
        }
        .spec-table td {
            padding: 8px 8px;
            font-size: 11px;
            color: #ccc;
            border-bottom: 1px solid #222;
            vertical-align: top;
            line-height: 1.4;
        }
        .spec-table tr:last-child td { border-bottom: none; }
        .spec-highlight { color: #fff; font-weight: 600; }

        /* --- RESPONSIVE MOBILE VIEW --- */
        @media (max-width: 768px) {
            .comparison-row {
                grid-template-columns: 1fr;
                justify-items: center;
                padding: 20px;
                gap: 24px;
            }
            .info {
                width: 100%;
            }
            .knob-view {
                width: 240px;
                height: 240px;
            }
            .metallic-knob {
                width: 170px;
                height: 170px;
            }
            .timeline-header {
                font-size: 10px;
            }
            .legend-item {
                font-size: 10px;
            }
            .spec-table th {
                font-size: 9px;
                padding: 4px;
            }
            .spec-table td {
                font-size: 10px;
                padding: 6px 4px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>E&H LED Knob Behavior</h1>
        <p>Physical LED Alignment: #1 at 12 o'clock, incrementing Clockwise to #16. Home Position at LED #9 (6 o'clock).</p>
        
        <div class="global-tabs" id="appliance-selector">
            <div class="tab active" data-mode="washer">Washer</div>
            <div class="tab" data-mode="dryer">Dryer</div>
        </div>
    </div>

    <div class="gallery" id="gallery-root"></div>

    <script>
        const LED_COUNT = 16;
        const HOME_IDX = 8; 
        
        let currentMode = 'washer';
        let currentPhase = 'sense'; 
        let activeAnimations = [];

        const ease = {
            inOutQuad: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
            inQuad: t => t * t, // Quadratic acceleration (Gravity)
            outCubic: t => 1 - Math.pow(1 - t, 3),
            linear: t => t
        };

        class AnimationInstance {
            constructor(id, title, description, steps, drawFn, config = {}) {
                this.id = id;
                this.drawFn = drawFn;
                this.steps = steps;
                this.totalDuration = steps.reduce((acc, s) => acc + s.duration, 0);
                this.leds = new Array(LED_COUNT).fill(0);
                this.isDestroyed = false;
                this.config = config;
                this.createUI(title, description);
                this.animate();
            }

            createUI(title, description) {
                const row = document.createElement('div');
                row.className = 'comparison-row';
                
                let trackHTML = '';
                let legendHTML = '';
                this.steps.forEach(step => {
                    const pct = (step.duration / this.totalDuration) * 100;
                    trackHTML += `<div class="timeline-step" style="width: ${pct}%; background-color: ${step.color};"></div>`;
                    legendHTML += `
                        <div class="legend-item">
                            <div class="legend-left">
                                <span class="legend-color" style="background-color: ${step.color};"></span>
                                <span>${step.name} <span class="legend-curve">(${step.curve})</span></span>
                            </div>
                            <div>${step.duration}ms</div>
                        </div>
                    `;
                });

                const phaseTabs = this.config.showPhaseTabs ? `
                    <div class="phase-tabs">
                        ${currentMode === 'washer' ? `
                            <div class="phase-tab ${currentPhase === 'sense' ? 'active' : ''}" data-phase="sense">Sense</div>
                            <div class="phase-tab ${currentPhase === 'wash' ? 'active' : ''}" data-phase="wash">Wash</div>
                            <div class="phase-tab ${currentPhase === 'spin' ? 'active' : ''}" data-phase="spin">Spin</div>
                        ` : `
                            <div class="phase-tab ${currentPhase === 'dry' ? 'active' : ''}" data-phase="dry">Drying</div>
                        `}
                    </div>
                ` : '';

                const specHTML = this.config.specHTML ? `
                    <details class="spec-details">
                        <summary class="spec-summary">View Technical Spec</summary>
                        <div class="spec-content">
                            ${this.config.specHTML}
                        </div>
                    </details>
                ` : '';

                row.innerHTML = `
                    <div class="knob-view">
                        <svg viewBox="0 0 300 300">
                            <circle cx="150" cy="150" r="119" fill="none" stroke="#1c1c1c" stroke-width="22"></circle>
                            <g class="led-layer"></g>
                        </svg>
                        <div class="metallic-knob"></div>
                    </div>
                    <div class="info">
                        ${phaseTabs}
                        <h2>${title}</h2>
                        <p>${description}</p>
                        <div class="timeline-container">
                            <div class="timeline-header">
                                <span>Logic Spec</span>
                                <span>Loop: ${this.totalDuration}ms</span>
                            </div>
                            <div class="timeline-track">${trackHTML}</div>
                            <div class="timeline-legend">${legendHTML}</div>
                        </div>
                        ${specHTML}
                    </div>
                `;
                
                document.getElementById('gallery-root').appendChild(row);
                
                row.querySelectorAll('.phase-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        currentPhase = e.target.dataset.phase;
                        renderGallery();
                    });
                });

                this.ledElements = [];
                const layer = row.querySelector('.led-layer');
                for (let i = 0; i < LED_COUNT; i++) {
                    const angle = (i / LED_COUNT) * Math.PI * 2;
                    const bgLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    bgLine.setAttribute("x1", 150 + Math.cos(angle) * 112); bgLine.setAttribute("y1", 150 + Math.sin(angle) * 112);
                    bgLine.setAttribute("x2", 150 + Math.cos(angle) * 126); bgLine.setAttribute("y2", 150 + Math.sin(angle) * 126);
                    bgLine.setAttribute("class", "led-bg");
                    layer.appendChild(bgLine);
                    const fg = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    fg.setAttribute("x1", 150 + Math.cos(angle) * 112); fg.setAttribute("y1", 150 + Math.sin(angle) * 112);
                    fg.setAttribute("x2", 150 + Math.cos(angle) * 126); fg.setAttribute("y2", 150 + Math.sin(angle) * 126);
                    fg.setAttribute("class", "led");
                    layer.appendChild(fg);
                    this.ledElements.push(fg);
                }
            }

            destroy() { this.isDestroyed = true; }
            clear() { this.leds.fill(0); }
            setLED(index, brightness) {
                let i = ((index % LED_COUNT) + LED_COUNT) % LED_COUNT;
                let floor = Math.floor(i), frac = i - floor;
                this.addBrightness(floor, brightness * (1 - frac));
                this.addBrightness(floor + 1, brightness * frac);
            }
            addBrightness(idx, val) {
                let i = ((idx % LED_COUNT) + LED_COUNT) % LED_COUNT;
                this.leds[i] = Math.min(255, this.leds[i] + val);
            }
            render() { 
                this.ledElements.forEach((el, i) => { 
                    const activeOpacity = this.leds[i] / 255;
                    el.style.opacity = 0.02 + (activeOpacity * 0.98); 
                }); 
            }
            animate() {
                const startTime = Date.now();
                const loop = () => {
                    if (this.isDestroyed) return;
                    this.clear();
                    this.drawFn(Date.now() - startTime, this);
                    this.render();
                    requestAnimationFrame(loop);
                };
                loop();
            }
        }

        function renderGallery() {
            activeAnimations.forEach(a => a.destroy());
            activeAnimations = [];
            document.getElementById('gallery-root').innerHTML = '';

            const targetIdx = currentMode === 'washer' ? 14 : 5;

            // --- 1. POWER ON ---
            activeAnimations.push(new AnimationInstance(
                "power-on", "Power On (Symmetric Collapse)", 
                `Refined physics: brief pause, full bloom, and an accelerated symmetric retraction to ensure a clean landing on the selection.`,
                [
                    { name: "Preparation", duration: 300, color: "#222", curve: "Wait" },
                    { name: "Global Bloom", duration: 700, color: "#3b82f6", curve: "Sine" },
                    { name: "Retraction", duration: 1000, color: "#fff", curve: "Cubic-Out" },
                    { name: "Hold", duration: 1500, color: "transparent", curve: "Static" }
                ],
                (ms, k) => {
                    const total = 3500, prep = 300, bloom = 700, retract = 1000;
                    let elapsed = ms % total;
                    if (elapsed < prep) {
                    } else if (elapsed < prep + bloom) {
                        let t = (elapsed - prep) / bloom;
                        let b = t * 180;
                        for(let i=0; i<16; i++) k.addBrightness(i, b);
                    } else if (elapsed < prep + bloom + retract) {
                        let t = (elapsed - (prep + bloom)) / retract;
                        let easeVal = ease.outCubic(t);
                        for(let i=0; i<16; i++) {
                            let dist = Math.abs(i - targetIdx);
                            if (dist > 8) dist = 16 - dist;
                            let normDist = dist / 8; 
                            let threshold = 1.0 - easeVal;
                            if (normDist <= threshold) {
                                k.addBrightness(i, 180 + (t * 75));
                            } else {
                                let fadeOut = Math.max(0, 1.0 - (easeVal - (1.0 - normDist)) * 10);
                                k.addBrightness(i, 180 * fadeOut);
                            }
                        }
                    } else {
                        k.setLED(targetIdx, 255);
                    }
                },
                {
                    specHTML: `
                        <table class="spec-table">
                            <tr><th>Time (ms)</th><th>Phase</th><th>LED States (0-255)</th><th>Curve</th></tr>
                            <tr><td>0 - 300</td><td>Prep</td><td>All LEDs: <span class="spec-highlight">0</span></td><td>Wait</td></tr>
                            <tr><td>300 - 1000</td><td>Bloom</td><td>All LEDs: <span class="spec-highlight">0 &rarr; 180</span></td><td>Sine</td></tr>
                            <tr><td>1000 - 2000</td><td>Retraction</td><td>Target LED: <span class="spec-highlight">180 &rarr; 255</span><br>Other LEDs: <span class="spec-highlight">180 &rarr; 0</span> (10x dist falloff)</td><td>Cubic-Out</td></tr>
                            <tr><td>2000+</td><td>Hold</td><td>Target LED: <span class="spec-highlight">255</span><br>Other LEDs: <span class="spec-highlight">0</span></td><td>Static</td></tr>
                        </table>
                    `
                }
            ));

            // --- 2. CYCLE PROGRESS ---
            let progressSteps = [];
            let progressDraw = () => {};
            let progressDesc = "";
            let progressSpecHTML = "";

            if (currentPhase === 'sense') {
                progressDesc = "Active Load Scan: A high-contrast beam originates from the 6 o'clock position and oscillates back and forth, simulating the active detection of weight and load distribution.";
                progressSteps = [{ name: "Pendulum Scan", duration: 2400, color: "#3b82f6", curve: "Sine Oscillation" }];
                progressDraw = (ms, k) => {
                    k.setLED(targetIdx, 255);
                    let t = (ms % 2400) / 2400;
                    let scanOffset = 4.5 * Math.sin(t * Math.PI * 2);
                    let scanPos = 8 + scanOffset;
                    for(let i=0; i<16; i++) {
                        let dist = Math.abs(i - scanPos);
                        if (dist > 8) dist = 16 - dist;
                        let b = Math.max(0, 220 * (1 - dist / 2.5));
                        k.addBrightness(i, b + 20);
                    }
                };
                progressSpecHTML = `
                    <table class="spec-table">
                        <tr><th>Time (ms)</th><th>Phase</th><th>LED States (0-255)</th><th>Curve</th></tr>
                        <tr><td>0 - 2400<br>(Loop)</td><td>Pendulum</td><td>Target LED: <span class="spec-highlight">255</span><br>Ring Base: <span class="spec-highlight">20</span><br>Ring Peak: <span class="spec-highlight">240</span> (Oscillates Index 3.5 &harr; 12.5)</td><td>Sine</td></tr>
                    </table>
                `;
            } else if (currentPhase === 'wash') {
                progressDesc = "Fluid Sway: Low-intensity pulses with a distinct bilateral shift representing water.";
                progressSteps = [{ name: "Sway Logic", duration: 4000, color: "#6366f1", curve: "Floating Sine" }];
                progressDraw = (ms, k) => {
                    k.setLED(targetIdx, 255);
                    let t = (ms % 4000) / 4000;
                    let sway = Math.sin(t * Math.PI * 2);
                    for(let i=0; i<16; i++) {
                        let angle = (i / 16) * Math.PI * 2;
                        let b = 80 + 70 * Math.sin(angle + (sway * 1.0));
                        k.addBrightness(i, b);
                    }
                };
                progressSpecHTML = `
                    <table class="spec-table">
                        <tr><th>Time (ms)</th><th>Phase</th><th>LED States (0-255)</th><th>Curve</th></tr>
                        <tr><td>0 - 4000<br>(Loop)</td><td>Sway</td><td>Target LED: <span class="spec-highlight">255</span><br>Ring Base: <span class="spec-highlight">10</span><br>Ring Peak: <span class="spec-highlight">150</span> (Bilateral shift logic)</td><td>Sine</td></tr>
                    </table>
                `;
            } else if (currentPhase === 'spin') {
                progressDesc = "Luminous Drift: Feathered gradient indicating centrifugal extraction.";
                progressSteps = [{ name: "Gradient Rotation", duration: 1200, color: "#8b5cf6", curve: "Linear Drift" }];
                progressDraw = (ms, k) => {
                    k.setLED(targetIdx, 255);
                    let t = (ms % 1200) / 1200;
                    let pivot = t * 16;
                    for(let i=0; i<16; i++) {
                        let dist = Math.min(Math.abs(i - pivot), Math.abs(i - (pivot + 16)), Math.abs(i - (pivot - 16)));
                        let b = Math.max(0, 150 * (1 - dist / 5));
                        k.addBrightness(i, b + 20);
                    }
                };
                progressSpecHTML = `
                    <table class="spec-table">
                        <tr><th>Time (ms)</th><th>Phase</th><th>LED States (0-255)</th><th>Curve</th></tr>
                        <tr><td>0 - 1200<br>(Loop)</td><td>Drift</td><td>Target LED: <span class="spec-highlight">255</span><br>Ring Base: <span class="spec-highlight">20</span><br>Ring Peak: <span class="spec-highlight">170</span> (5-LED gradient tail)</td><td>Linear</td></tr>
                    </table>
                `;
            } else if (currentPhase === 'dry') {
                progressDesc = "Steady Tumble: Consistent rotational gradient at a lower intensity for ambient feedback during drying phases.";
                progressSteps = [{ name: "Tumble Rotation", duration: 2200, color: "#f59e0b", curve: "Linear" }];
                progressDraw = (ms, k) => {
                    k.setLED(targetIdx, 255);
                    let t = (ms % 2200) / 2200;
                    let pivot = t * 16;
                    for(let i=0; i<16; i++) {
                        let dist = Math.min(Math.abs(i - pivot), Math.abs(i - (pivot + 16)), Math.abs(i - (pivot - 16)));
                        let b = Math.max(0, 120 * (1 - dist / 6)); 
                        k.addBrightness(i, b + 20); 
                    }
                };
                progressSpecHTML = `
                    <table class="spec-table">
                        <tr><th>Time (ms)</th><th>Phase</th><th>LED States (0-255)</th><th>Curve</th></tr>
                        <tr><td>0 - 2200<br>(Loop)</td><td>Tumble</td><td>Target LED: <span class="spec-highlight">255</span><br>Ring Base: <span class="spec-highlight">20</span><br>Ring Peak: <span class="spec-highlight">140</span> (6-LED gradient tail)</td><td>Linear</td></tr>
                    </table>
                `;
            }

            activeAnimations.push(new AnimationInstance("cycle-progress", "Cycle Progress", progressDesc, progressSteps, progressDraw, { showPhaseTabs: true, specHTML: progressSpecHTML }));

            // --- 3. POWER OFF ---
            activeAnimations.push(new AnimationInstance(
                "power-off", "Power Off (Gravity-Accelerated Sweep)", 
                `When the system is triggered to power off, a centric beam of light originates between the top LEDs and accelerates downward using gravitational physics (quadratic acceleration), wiping the ring clean as it falls toward the bottom.`,
                [
                    { name: "Active Selection", duration: 1000, color: "#3b82f6", curve: "Static" },
                    { name: "Gravitational Sweep", duration: 800, color: "#fff", curve: "Quadratic In" },
                    { name: "Off", duration: 1200, color: "transparent", curve: "Static" }
                ],
                (ms, k) => {
                    const hold = 1000, sweep = 800, total = 3000;
                    let elapsed = ms % total;
                    if (elapsed < hold) {
                        k.setLED(targetIdx, 255);
                    } else if (elapsed < hold + sweep) {
                        let t = (elapsed - hold) / sweep;
                        let scanPos = ease.inQuad(t) * 8; 
                        for(let i=0; i<16; i++) {
                            let distFromMid = Math.abs(i - (-0.5));
                            if (distFromMid > 8) distFromMid = 16 - distFromMid;
                            let relativeDist = distFromMid - 0.5;
                            let beamIntensity = Math.max(0, 255 * (1 - Math.abs(relativeDist - scanPos) / 1.1));
                            k.addBrightness(i, beamIntensity);
                            if (relativeDist > scanPos) {
                                if (i === targetIdx) k.addBrightness(i, 255);
                            }
                        }
                    }
                },
                {
                    specHTML: `
                        <table class="spec-table">
                            <tr><th>Time (ms)</th><th>Phase</th><th>LED States (0-255)</th><th>Curve</th></tr>
                            <tr><td>0 - 1000</td><td>Hold</td><td>Target LED: <span class="spec-highlight">255</span><br>Other LEDs: <span class="spec-highlight">0</span></td><td>Static</td></tr>
                            <tr><td>1000 - 1800</td><td>Sweep</td><td>Wipe Origin: Index -0.5 (Top Dead Center).<br>Target LED: <span class="spec-highlight">255 &rarr; 0</span> (as beam passes).<br>Other LEDs: <span class="spec-highlight">0</span> (unless hit by beam peak).</td><td>Quadratic-In</td></tr>
                            <tr><td>1800+</td><td>Off</td><td>All LEDs: <span class="spec-highlight">0</span></td><td>Static</td></tr>
                        </table>
                    `
                }
            ));

            // --- 4. CYCLE END ---
            activeAnimations.push(new AnimationInstance(
                "cycle-end", "Cycle End with Post-Care", 
                "A full-ring ambient beacon signals cycle completion, periodically transitioning into kinetic rotational sequences to reflect active drum tumbling and aeration during the Post-Care phase.",
                [
                    { name: "Persistent Beacon", duration: 10000, color: "#3b82f6", curve: "Slow Pulse" },
                    { name: "Transition Down", duration: 800, color: "#444", curve: "Ease-Out" },
                    { name: "Tumble Rotation", duration: 4000, color: "#8b5cf6", curve: "Quad In-Out" },
                    { name: "Transition Up", duration: 800, color: "#444", curve: "Ease-In" }
                ],
                (ms, k) => {
                    const bth = 10000, fd1 = 800, spn = 4000, fd2 = 800;
                    const total = bth + fd1 + spn + fd2;
                    let elapsed = ms % total;
                    if (elapsed < bth) {
                        let pulse = 0.9 + 0.1 * Math.sin((elapsed/4000) * Math.PI * 2);
                        for(let i=0; i<16; i++) k.addBrightness(i, 255 * pulse);
                    } else if (elapsed < bth + fd1) {
                        let t = (elapsed - bth) / fd1;
                        let b = 255 - (ease.inOutQuad(t) * 230);
                        for(let i=0; i<16; i++) k.addBrightness(i, b);
                    } else if (elapsed < bth + fd1 + spn) {
                        for(let i=0; i<16; i++) k.addBrightness(i, 25);
                        let t = (elapsed - (bth + fd1)) / spn;
                        let e = ease.inOutQuad(t);
                        let p1 = e * 31, p2 = p1 + 8;
                        let tailB = t < 0.1 ? (t/0.1)*255 : (t > 0.8 ? (1-(t-0.8)/0.2)*255 : 255);
                        for(let i=0; i<5; i++) { 
                            k.setLED(p1 - i, tailB * (1-i/4.5)); 
                            k.setLED(p2 - i, tailB * (1-i/4.5)); 
                        }
                    } else {
                        let t = (elapsed - (bth + fd1 + spn)) / fd2;
                        let b = 25 + (ease.inOutQuad(t) * 230);
                        for(let i=0; i<16; i++) k.addBrightness(i, b);
                    }
                },
                {
                    specHTML: `
                        <table class="spec-table">
                            <tr><th>Time (s)</th><th>Phase</th><th>LED States (0-255)</th><th>Curve</th></tr>
                            <tr><td>0.0 - 10.0</td><td>Beacon</td><td>All LEDs: Pulse <span class="spec-highlight">204 &harr; 255</span></td><td>Sine</td></tr>
                            <tr><td>10.0 - 10.8</td><td>Trans-D</td><td>All LEDs: <span class="spec-highlight">255 &rarr; 25</span></td><td>Quad In-Out</td></tr>
                            <tr><td>10.8 - 14.8</td><td>Tumble</td><td>Ring Base: <span class="spec-highlight">25</span><br>Dual Spinners: Peak <span class="spec-highlight">255</span> (Length 5 gradient)</td><td>Quad In-Out</td></tr>
                            <tr><td>14.8 - 15.6</td><td>Trans-U</td><td>All LEDs: <span class="spec-highlight">25 &rarr; 255</span></td><td>Quad In-Out</td></tr>
                        </table>
                    `
                }
            ));

            // --- 5. FAULT ALERT ---
            activeAnimations.push(new AnimationInstance(
                "fault-alert", "Fault / Hard-Stop Alert", 
                `A rhythmic high-urgency double pulse across the entire ring.`,
                [
                    { name: "Double Burst", duration: 450, color: "#ef4444", curve: "Sharp Pulse" },
                    { name: "Wait", duration: 750, color: "#1a1a1a", curve: "Hold" }
                ],
                (ms, k) => {
                    const cycle = 1200;
                    let elapsed = ms % cycle;
                    if ((elapsed >= 0 && elapsed < 150) || (elapsed >= 300 && elapsed < 450)) {
                        for(let i=0; i<16; i++) k.addBrightness(i, 255);
                    }
                },
                {
                    specHTML: `
                        <table class="spec-table">
                            <tr><th>Time (ms)</th><th>Phase</th><th>LED States (0-255)</th><th>Curve</th></tr>
                            <tr><td>0 - 150</td><td>Pulse 1</td><td>All LEDs: <span class="spec-highlight">255</span></td><td>Instant</td></tr>
                            <tr><td>150 - 300</td><td>Off</td><td>All LEDs: <span class="spec-highlight">0</span></td><td>Instant</td></tr>
                            <tr><td>300 - 450</td><td>Pulse 2</td><td>All LEDs: <span class="spec-highlight">255</span></td><td>Instant</td></tr>
                            <tr><td>450 - 1200</td><td>Wait</td><td>All LEDs: <span class="spec-highlight">0</span></td><td>Instant</td></tr>
                        </table>
                    `
                }
            ));
        }

        document.querySelectorAll('#appliance-selector .tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('#appliance-selector .tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMode = e.target.dataset.mode;
                if (currentMode === 'dryer') currentPhase = 'dry';
                else if (currentPhase === 'dry') currentPhase = 'wash';
                renderGallery();
            });
        });

        renderGallery();
    </script>
</body>
</html>
